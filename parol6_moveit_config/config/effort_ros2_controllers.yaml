# ROS2 Control configuration for gravity compensated effort controllers
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Effort-based trajectory controller for Gravity Compensation
    parol6_effort_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

parol6_effort_trajectory_controller:
  ros__parameters:
    joints:
      - joint_L1
      - joint_L2
      - joint_L3
      - joint_L4
      - joint_L5
      - joint_L6
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
      - effort
    gains:
      # These PID gains calculate the feedforward effort required to follow the 
      # position trajectory after gravity compensation has been handled by the hardware.
      # (Or they provide the full stiffness if hardware doesn't naturally compensate).
      # Adjust these values based on actual physical tuning.
      joint_L1: {p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0}
      joint_L2: {p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0}
      joint_L3: {p: 100.0, d: 10.0, i: 0.1, i_clamp: 1.0}
      joint_L4: {p: 50.0, d: 5.0, i: 0.1, i_clamp: 1.0}
      joint_L5: {p: 50.0, d: 5.0, i: 0.1, i_clamp: 1.0}
      joint_L6: {p: 20.0, d: 2.0, i: 0.05, i_clamp: 1.0}
