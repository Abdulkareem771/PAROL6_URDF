; PAROL6 realtime_servo_blackpill — PlatformIO build file
; Wraps the STM32Duino Arduino sketch for PlatformIO CLI.
; Board: WeAct Studio BlackPill V2.0 (STM32F411CEU6)
;
; Flash options:
;   DFU (USB bootloader):  hold BOOT0 + press NRST, or firmware sends <REBOOT_DFU>
;   ST-Link:               change upload_protocol = stlink (needs hardware debugger)
;
; Usage from console Flash tab:
;   Project dir  → PAROL6/firmware/realtime_servo_blackpill
;   Environment  → blackpill_realtime

[platformio]
src_dir = .

[env:blackpill_realtime]
platform      = ststm32
board         = blackpill_f411ce
framework     = arduino

; USB CDC — board enumerates as /dev/ttyACM0 at runtime
; DFU (0483:df11) when BOOT0 held at reset
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBCON
    -D USBD_VID=0x0483
    -D USBD_PID=0x5740
    -D USB_MANUFACTURER="Unknown"
    -D USB_PRODUCT="\"BLACKPILL_F411CE\""

; === Upload =================================================================
upload_protocol = dfu
upload_flags    = -s 0x08000000:leave

; Fallback: uncomment to use ST-Link instead
; upload_protocol = stlink

; === Build ==================================================================
; Treat the .ino as a .cpp (PlatformIO handles this automatically)
build_src_filter = +<*> -<.git/>

; Exclude nothing — all .cpp and .h in this directory are part of the sketch
lib_compat_mode = off

; === Serial monitor =========================================================
monitor_speed   = 115200
monitor_filters = time
