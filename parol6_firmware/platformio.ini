[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
build_src_filter =
    +<*>
    -<main_j6_test.cpp>
    -<debug/>
build_flags =
    -O3
    -ffast-math
    -std=gnu++17
    -D TEENSY_OPT_FASTEST
lib_deps =
    rlogiacco/CircularBuffer@^1.3.3


; ── Single-Joint (J6) Integration Test ─────────────────────────────────────────
[env:teensy41_j6_test]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
build_src_filter =
    -<main.cpp>
    -<debug/>
    +<main_j6_test.cpp>
    +<transport/>
    +<hal/>
    +<observer/>
    +<control/>
    +<safety/>
build_flags =
    -O2
    -std=gnu++17
    -D TRANSPORT_MODE=1
    -D NUM_AXES=1
lib_deps =
    rlogiacco/CircularBuffer@^1.3.3


; ══════════════════════════════════════════════════════════════════════════════
; DEBUG STAGES — flash each one to isolate hardware issues step by step
; ══════════════════════════════════════════════════════════════════════════════

; Stage 1: USB echo + LED heartbeat. No libraries, nothing can crash.
[env:debug_stage1]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
build_src_filter =
    -<main.cpp>
    -<main_j6_test.cpp>
    +<debug/stage1_echo.cpp>

; Stage 2: Fake ACK packets at 25 Hz. Verifies GUI/ROS can parse feedback.
[env:debug_stage2]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
build_src_filter =
    -<main.cpp>
    -<main_j6_test.cpp>
    +<debug/stage2_fake_ack.cpp>

; Stage 3: Real J6 encoder (SoftwareInterrupt pin 18). No stepper yet.
[env:debug_stage3]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
build_src_filter =
    -<main.cpp>
    -<main_j6_test.cpp>
    +<debug/stage3_encoder.cpp>
    +<hal/SoftwareInterruptEncoder.cpp>
build_flags =
    -std=gnu++17
lib_deps =
    rlogiacco/CircularBuffer@^1.3.3

; Stage 4: Full J6 — encoder + ToneStepper + position loop (no #ifdefs)
[env:debug_stage4]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
build_src_filter =
    -<main.cpp>
    -<main_j6_test.cpp>
    +<debug/stage4_motor.cpp>
    +<transport/>
    +<hal/>
    +<observer/>
    +<control/>
    +<safety/>
build_flags =
    -O2
    -std=gnu++17
lib_deps =
    rlogiacco/CircularBuffer@^1.3.3

; ── STM32 BlackPill ────────────────────────────────────────────────────────
[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = arduino
upload_protocol = dfu
build_src_filter =
    +<*>
    -<main_j6_test.cpp>
    -<debug/>
build_flags =
    -O3
    -ffast-math
    -std=gnu++17
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBCON
    -D USBD_VID=0x0483
    -D USBD_PID=0xDF11
    -D USB_MANUFACTURER="Unknown"
    -D USB_PRODUCT="\"BLACKPILL_F411CE\""
lib_deps =
    rlogiacco/CircularBuffer@^1.3.3
